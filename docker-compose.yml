# Lokal Postgres (ixtiyoriy): Docker Desktop yoq bo'lsa
#   docker compose --profile postgres up -d
# Keyin django_backend/.env da:
#   DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/swift_bookings
services:
  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swift_bookings
    ports:
      - "5432:5432"
    volumes:
      - swift_bookings_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swift_bookings"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  swift_bookings_pg:
