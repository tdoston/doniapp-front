# doniapp-front — Root: /

[build]
# install: nixpacks.toml npm ci (ikkinchi npm ci .vite EBUSY beradi)
buildCommand = "rm -rf dist node_modules/.vite 2>/dev/null || true && npm run build"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
startCommand = "npm run start:railway"
